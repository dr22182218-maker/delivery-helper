<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掃雷助手 🛵</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:15px;
}

input,textarea{
width:90%;
padding:12px;
margin:8px 0;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.nav{background:#2ecc71;color:white;}
.add{background:#e74c3c;color:white;width:90%;}
.mine{background:#ff4444;color:white;}
.safe{background:#f39c12;color:white;}
.delete{background:#555;color:white;}
.voice{background:#3498db;color:white;}

.card{
background:#222;
padding:15px;
margin:15px 5%;
border-radius:10px;
text-align:left;
}

.suggest{
background:#333;
margin:5px;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.note{
background:#333;
padding:8px;
border-radius:5px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>掃雷助手 🛵</h1>

<input id="search" placeholder="輸入地址 / 關鍵字 / 社區" oninput="suggest()">

<div id="suggest"></div>

<button class="voice" onclick="voiceSearch()">🎤 語音輸入</button>
<button class="nav" onclick="directNav()">🗺️ 直接導航</button>

<textarea id="note" placeholder="備註 (停車 / 入口 / 社區名)"></textarea>

<button class="add" onclick="add()">新增雷區</button>

<hr>

<div id="list"></div>

<script>

const defaultMines=[

{address:"研究院路二段12巷58弄19號",mine:false,note:"新苗幼稚園附近"},
{address:"東勢街201巷106弄38號",mine:true,note:"天宿旁社區"}

];

let data=JSON.parse(localStorage.getItem("deliveryMines"));

if(!data){
data=defaultMines;
save();
}

render();

function save(){
localStorage.setItem("deliveryMines",JSON.stringify(data));
}

function suggest(){

let keyword=document.getElementById("search").value
.trim()
.toLowerCase();

if(keyword===""){
document.getElementById("suggest").innerHTML="";
return;
}

let html="";

data.forEach(d=>{

let addr=(d.address||"").toLowerCase();
let note=(d.note||"").toLowerCase();

if(addr.includes(keyword) || note.includes(keyword)){

html+=`
<div class="suggest" onclick="selectAddress('${d.address}')">

${d.mine?"💀":"✅"} ${d.address}

${d.note?`<div style="font-size:13px;color:#aaa">${d.note}</div>`:""}

</div>
`;

}

});

document.getElementById("suggest").innerHTML=html;

}

function selectAddress(a){

document.getElementById("search").value=a;
document.getElementById("suggest").innerHTML="";

}

function voiceSearch(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();

recognition.lang="zh-TW";

recognition.start();

recognition.onresult=function(event){

let text=event.results[0][0].transcript;

document.getElementById("search").value=text;

suggest();

};

}

function nav(address){

window.open("https://maps.google.com/?q="+encodeURIComponent(address));

}

function directNav(){

let address=document.getElementById("search").value;

if(!address){
alert("請輸入地址");
return;
}

nav(address);

}

function add(){

let address=document.getElementById("search").value;
let note=document.getElementById("note").value;

if(!address){
alert("請輸入地址");
return;
}

data.push({
address:address,
mine:true,
note:note
});

save();
render();

document.getElementById("search").value="";
document.getElementById("note").value="";

}

function remove(i){

data.splice(i,1);

save();
render();

}

function toggleMine(i){

data[i].mine=!data[i].mine;

save();
render();

}

function render(){

let html="";

data.slice().reverse().forEach((d,i)=>{

let idx=data.length-1-i;

html+=`

<div class="card">

<h3>${d.mine?"💀":"✅"} ${d.address}</h3>

${d.note?`<div class="note">📝 ${d.note}</div>`:""}

<br>

<button class="nav" onclick="nav('${d.address}')">導航</button>

<button class="${d.mine?'safe':'mine'}" onclick="toggleMine(${idx})">

${d.mine?"轉友善":"設雷區"}

</button>

<button class="delete" onclick="remove(${idx})">刪除</button>

</div>

`;

});

document.getElementById("list").innerHTML=html;

}

</script>

</body>
</html>
