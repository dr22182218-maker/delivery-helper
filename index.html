<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掃雷助手 🛵</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:15px;
}

h1{
margin-bottom:20px;
}

input,textarea{
width:90%;
padding:12px;
margin:8px 0;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.scan{
background:#3498db;
color:white;
}

.nav{
background:#2ecc71;
color:white;
}

.add{
background:#e74c3c;
color:white;
width:90%;
margin-top:10px;
}

.mine{
background:#ff4444;
color:white;
}

.safe{
background:#f39c12;
color:white;
}

.delete{
background:#555;
color:white;
}

.card{
background:#222;
padding:15px;
margin:15px 5%;
border-radius:10px;
text-align:left;
}

.suggest{
background:#333;
margin:5px 5%;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.note{
background:#333;
padding:8px;
border-radius:5px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>掃雷助手 🛵</h1>

<input id="search" placeholder="輸入地址或關鍵字" oninput="suggest()">

<br>

<button class="scan" onclick="document.getElementById('ocr').click()">📷 拍訂單</button>

<button class="nav" onclick="directNav()">🗺️ 直接導航</button>

<input type="file" id="ocr" accept="image/*" capture="environment" style="display:none" onchange="scan(this)">

<div id="suggest"></div>

<textarea id="note" placeholder="備註 (停車 / 入口 / 換證)"></textarea>

<button class="add" onclick="add()">新增雷區</button>

<hr>

<div id="list"></div>

<script>


const defaultMines=[

{address:"汐止區湖前街110巷97弄24號 水蓮山莊",mine:true,note:"社區很大"},

{address:"汐止區新台五路一段97號 IFG遠雄廣場",mine:true,note:"百貨難停車"},

{address:"內湖區瑞光路全線",mine:true,note:"下班時間爆塞"},

{address:"內湖區成功路二段325號 三軍總醫院",mine:true,note:"醫院迷宮"},

{address:"南港區忠孝東路七段359號 南港火車站",mine:true,note:"共構商場"},

{address:"南港區研究院路二段128號 中央研究院",mine:true,note:"院區很大"}

];

let data=JSON.parse(localStorage.getItem("deliveryMines"));

if(!data){

data=defaultMines;

save();

}

render();


function save(){

localStorage.setItem("deliveryMines",JSON.stringify(data));

}



function suggest(){

let s=document.getElementById("search").value

.replace(/\s+/g,"")

.toLowerCase();

let html="";

data.forEach(d=>{

let addr=d.address

.replace(/\s+/g,"")

.toLowerCase();

if((addr.includes(s)||s.includes(addr))&&s!=""){

html+=`<div class="suggest" onclick="selectAddress('${d.address}')">

${d.mine?"💀":"✅"} ${d.address}

</div>`;

}

});

document.getElementById("suggest").innerHTML=html;

}



function selectAddress(a){

document.getElementById("search").value=a;

document.getElementById("suggest").innerHTML="";

}



function nav(address){

let url="https://maps.google.com/?q="+encodeURIComponent(address);

window.open(url,"_blank");

}



function directNav(){

let address=document.getElementById("search").value;

if(!address){

alert("請輸入地址");

return;

}

let found=data.find(d=>

address.replace(/\s+/g,"")

.includes(

d.address.replace(/\s+/g,"")

)

);

if(found&&found.mine){

if(!confirm("⚠️ 雷區\n\n"+found.address+"\n\n仍要導航?")){

return;

}

}

nav(address);

}



async function scan(input){

if(!input.files[0])return;

let file=input.files[0];

const {data:{text}}=await Tesseract.recognize(file,"chi_tra");

let clean=text

.replace(/\s+/g,'')

.replace(/[^\u4e00-\u9fa50-9號段路街巷弄區市縣]/g,'');

document.getElementById("search").value=clean;

suggest();

let found=data.find(d=>

clean.includes(

d.address.replace(/\s+/g,'')

)

);

setTimeout(()=>{

if(found&&found.mine){

if(confirm("⚠️ 發現雷區\n\n"+found.address+"\n\n是否導航?")){

nav(found.address);

}

}else{

nav(clean);

}

},1000);

}



function add(){

let address=document.getElementById("search").value;

let note=document.getElementById("note").value;

if(!address){

alert("請輸入地址");

return;

}

data.push({

address:address,

mine:true,

note:note

});

save();

render();

document.getElementById("search").value="";

document.getElementById("note").value="";

}



function remove(i){

data.splice(i,1);

save();

render();

}



function toggleMine(i){

data[i].mine=!data[i].mine;

save();

render();

}



function render(){

let html="";

data.slice().reverse().forEach((d,i)=>{

let idx=data.length-1-i;

html+=`

<div class="card">

<h3>${d.mine?"💀":"✅"} ${d.address}</h3>

${d.note?`<div class="note">📝 ${d.note}</div>`:""}

<br>

<button class="nav" onclick="nav('${d.address}')">導航</button>

<button class="${d.mine?'safe':'mine'}" onclick="toggleMine(${idx})">

${d.mine?"轉友善":"設雷區"}

</button>

<button class="delete" onclick="remove(${idx})">刪除</button>

</div>

`;

});

document.getElementById("list").innerHTML=html;

}

</script>

</body>
</html>
