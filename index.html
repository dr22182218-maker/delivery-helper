<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掃雷助手 Pro 🛵</title>

<style>

body{
background:#111;
color:white;
font-family:"微軟正黑體",Arial;
text-align:center;
margin:0;
padding:15px;
}

input,textarea{
width:100%;
padding:14px;
margin:8px 0;
font-size:16px;
border-radius:8px;
border:none;
box-sizing:border-box;
}

button{
padding:14px;
margin:5px 0;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.add-btn{background:#e74c3c;color:white;}

.voice-btn{
background:#3498db;
color:white;
}

.card{
background:#222;
padding:15px;
margin:15px 0;
border-radius:10px;
text-align:left;
}

.suggest-box{
text-align:left;
margin-bottom:15px;
}

.suggest-item{
background:#333;
margin:5px 0;
padding:12px;
border-radius:6px;
cursor:pointer;
border-left:5px solid #aaa;
font-size:16px;
font-weight:bold;
}

.direct-nav{
background:#2ecc71;
padding:14px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
text-align:center;
}

</style>
</head>

<body>

<h2>🛵 掃雷助手 Pro</h2>

<input id="search" placeholder="輸入地址或語音" oninput="suggest()">

<button class="voice-btn" onclick="voice()">🎤 語音輸入</button>

<div id="suggest" class="suggest-box"></div>

<hr>

<textarea id="note" placeholder="備註 (警衛很兇 / 換證 / 沒電梯)" rows="2"></textarea>

<button class="add-btn" onclick="add()">💀 新增雷區</button>

<hr>

<div id="list"></div>

<script>

const defaultMines=[
{address:"南港區忠孝東路七段359號 南港車站",mine:true,note:"商場很難停"},
{address:"南港區研究院路二段128號 中研院",mine:true,note:"院區很大"},
{address:"汐止區新台五路一段97號 IFG遠雄",mine:true,note:"百貨難停"}
];

const streetDB=[
{
key:"合順街",
list:[
"南港區合順街5巷",
"南港區合順街7巷",
"南港區合順街12弄",
"南港區合順街20號"
]
},
{
key:"研究院路",
list:[
"研究院路一段",
"研究院路二段",
"研究院路三段"
]
}
];

let data=JSON.parse(localStorage.getItem("deliveryMines"));

if(!data||data.length==0){
data=defaultMines;
save();
}

render();

function save(){
localStorage.setItem("deliveryMines",JSON.stringify(data));
}

function clean(str){
return str.replace(/\s+/g,"").toLowerCase();
}

function generateNumbers(street){

let arr=[];

for(let i=1;i<=30;i++){
arr.push(street+i+"號");
}

return arr;

}

function suggest(){

let raw=document.getElementById("search").value;

let s=clean(raw);

let box=document.getElementById("suggest");

if(!raw){
box.innerHTML="";
return;
}

let html="";

data.forEach(d=>{

if(clean(d.address).includes(s)){

let color=d.mine?"#ff4444":"#2ecc71";

let icon=d.mine?"💀":"✅";

html+=`
<div class="suggest-item"
style="border-left-color:${color};color:${color}"
onclick="selectAddress('${d.address}')">
${icon} ${d.address}
</div>
`;

}

});

streetDB.forEach(sdb=>{

if(clean(sdb.key).includes(s)){

sdb.list.forEach(addr=>{

html+=`
<div class="suggest-item"
style="border-left-color:#3498db;color:#3498db"
onclick="nav('${addr}')">
📍 ${addr}
</div>
`;

});

}

});

if(raw.length>=2){

generateNumbers(raw).slice(0,8).forEach(addr=>{

html+=`
<div class="suggest-item"
style="border-left-color:#888;color:#ccc"
onclick="nav('${addr}')">
🏠 ${addr}
</div>
`;

});

}

html+=`
<div class="direct-nav"
onclick="nav('${raw}')">
🗺️ 直接導航：${raw}
</div>
`;

box.innerHTML=html;

}

function selectAddress(a){

document.getElementById("search").value=a;

document.getElementById("suggest").innerHTML="";

let ex=data.find(d=>d.address==a);

if(ex&&ex.note){

document.getElementById("note").value=ex.note;

}

}

function nav(addr){

let url="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(addr);

window.open(url,"_blank");

}

function add(){

let addr=document.getElementById("search").value;

let note=document.getElementById("note").value;

if(!addr){

alert("請輸入地址");

return;

}

let idx=data.findIndex(d=>clean(d.address)==clean(addr));

if(idx!=-1){

data[idx].note=note;

}else{

data.push({address:addr,mine:true,note:note});

}

save();

render();

}

function remove(i){

if(confirm("刪除?")){

data.splice(i,1);

save();

render();

}

}

function toggleMine(i){

data[i].mine=!data[i].mine;

save();

render();

}

function render(){

let html="";

data.slice().reverse().forEach((d,i)=>{

let idx=data.length-1-i;

let color=d.mine?"#ff4444":"#2ecc71";

html+=`

<div class="card" style="border-left:6px solid ${color}">

<h3>${d.mine?"💀":"✅"} ${d.address}</h3>

<div>${d.note||""}</div>

<button onclick="nav('${d.address}')">導航</button>

<button onclick="toggleMine(${idx})">

${d.mine?"轉友善":"設雷區"}

</button>

<button onclick="remove(${idx})">

刪除

</button>

</div>

`;

});

document.getElementById("list").innerHTML=html;

}

function voice(){

const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();

rec.lang="zh-TW";

rec.start();

rec.onresult=function(e){

let t=e.results[0][0].transcript;

document.getElementById("search").value=t;

suggest();

};

}

</script>

</body>
</html>
