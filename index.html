<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>掃雷助手 🛵</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body { background: #111; color: white; font-family: "微軟正黑體", Arial, sans-serif; text-align: center; margin: 0; padding: 10px; }
input, textarea { width: 90%; padding: 12px; margin: 8px 0; font-size: 16px; box-sizing: border-box; border-radius: 8px; border: none; }
button { padding: 12px 15px; margin: 5px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }

.add { background: #e74c3c; color: white; width: 90%; font-size: 18px; margin-top: 10px; }
.mine { background: #ff4444; color: white; }
.safe { background: #f39c12; color: white; }
.nav { background: #2ecc71; color: white; }
.delete { background: #555; color: white; }
.reset { background: #8e44ad; color: white; width: 90%; margin-top: 30px; font-size: 14px;}

/* 掃描按鈕樣式 */
.scan-btn { background: #3498db; color: white; width: 90%; font-size: 16px; margin-top: 5px; margin-bottom: 5px;}

.card { background: #222; padding: 15px; margin: 15px 5%; border-radius: 10px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
.suggest { background: #333; margin: 5px 5%; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; font-weight: bold;}
.note { color: #ccc; font-size: 15px; margin-top: 10px; background: #333; padding: 8px; border-radius: 5px; }
img { width: 100%; margin-top: 12px; border-radius: 8px; }

#ocrStatus { color: #f1c40f; font-size: 14px; margin-top: 5px; display: none; font-weight: bold; }
</style>
</head>

<body>

<h1>掃雷助手 🛵</h1>

<input id="search" placeholder="輸入地址或點擊下方拍照掃描" onkeyup="suggest()">

<button class="scan-btn" onclick="document.getElementById('ocrInput').click()">📱 拍接單螢幕：自動掃雷</button>
<input type="file" id="ocrInput" accept="image/*" capture="environment" style="display: none;" onchange="recognizeText(this)">

<div id="ocrStatus">⏳ 正在掃描螢幕文字... (約需 5 秒)</div>

<div id="suggest"></div>

<textarea id="note" placeholder="備註 (停車位置 / 入口 / 換證 / 沒電梯)" rows="3"></textarea>

<div style="text-align: left; width: 90%; margin: 10px auto; font-size: 14px; color: #aaa;">
    📍 附加雷區大樓外觀照片：
</div>
<input type="file" id="photo" accept="image/*">

<button class="add" onclick="新增雷區">新增雷區</button>

<hr style="border: 0.5px solid #333; margin: 20px 0;">

<div id="list"></div>

<button class="reset" onclick="resetApp()">⚠️ 清除所有資料 (重置 APP)</button>

<script>
const defaultMines = [
    { address: "汐止區湖前街110巷97弄24號 水蓮山莊", mine: true, note: "佔地太大，動線複雜", photo: "" },
    { address: "汐止區新台五路一段97號 IFG遠雄廣場", mine: true, note: "百貨公司難停車、取送餐皆耗時", photo: "" },
    { address: "內湖區瑞光路全線", mine: true, note: "⚠️ 4點半後車塞到屁股發光！慎接！", photo: "" },
    { address: "內湖區成功路二段325號 三軍總醫院", mine: true, note: "醫院大魔王，佔地廣大", photo: "" },
    { address: "南港區研究院路二段128號 中央研究院", mine: true, note: "院區超大，猶如迷宮", photo: "" },
    { address: "南港區忠孝東路七段359號 南港火車站", mine: true, note: "共構商場，無法臨停", photo: "" }
];

let data = JSON.parse(localStorage.getItem('deliveryMines'));
if (!data || data.length === 0) { data = defaultMines; saveDataToPhone(); }
render();

// 🌟 雙機流進化版：超強模糊比對邏輯
function suggest() {
    let s = document.getElementById("search").value.replace(/\s+/g, ''); // 去除空白
    let html = "";
    if (s !== "") {
        let count = 0;
        data.forEach(d => {
            // 只取地址部分（用空格切開，避開後面的地標名稱干擾）
            let mainAddress = d.address.split(' ')[0].replace(/\s+/g, ''); 
            
            // 邏輯：如果你打的字在地址裡，或是「螢幕掃出來的一大坨字」包含了你的地雷地址，就觸發警告！
            if ((mainAddress.includes(s) || s.includes(mainAddress)) && count < 5) {
                html += `<div class="suggest" onclick="selectAddress('${d.address}')" style="color: ${d.mine ? '#ff4444' : '#2ecc71'};">
                            ${d.mine ? '💀 發現雷區：' : '✅ 友善：'} ${d.address}
                         </div>`;
                count++;
            }
        });
    }
    document.getElementById("suggest").innerHTML = html;
}

function selectAddress(a) {
    document.getElementById("search").value = a;
    document.getElementById("suggest").innerHTML = "";
    let existingRecord = data.find(d => d.address === a);
    if(existingRecord) document.getElementById("note").value = existingRecord.note;
}

function saveDataToPhone() {
    try { localStorage.setItem('deliveryMines', JSON.stringify(data)); } 
    catch (e) { alert("儲存失敗！"); }
}

// 🌟 雙機流進化版：拍照掃描螢幕
async function recognizeText(input) {
    if (!input.files || input.files.length === 0) return;
    let file = input.files[0];
    
    let statusText = document.getElementById("ocrStatus");
    statusText.style.display = "block";
    statusText.style.color = "#f1c40f";
    statusText.innerText = "⏳ 正在掃描螢幕文字... (約需 5 秒)";
    
    try {
        const { data: { text } } = await Tesseract.recognize(file, 'chi_tra');
        let cleanText = text.replace(/\s+/g, '');
        
        // 將螢幕上所有亂七八糟的字塞進去
        document.getElementById("search").value = cleanText;
        
        // 呼叫超強比對邏輯
        suggest(); 
        
        // 判斷有沒有抓出地雷
        let suggestBox = document.getElementById("suggest");
        if (suggestBox.innerHTML !== "") {
            statusText.innerText = "⚠️ 警告！發現疑似雷區！請看下方！";
            statusText.style.color = "#ff4444";
        } else {
            statusText.innerText = "✅ 掃描完成！沒有發現地雷。";
            statusText.style.color = "#2ecc71";
            // 掃描完沒地雷的話，幫你把搜尋框的亂碼清空
            setTimeout(() => { document.getElementById("search").value = ""; }, 3000);
        }
        setTimeout(() => { statusText.style.display = "none"; }, 5000);
        
    } catch (err) {
        statusText.innerText = "❌ 辨識失敗，請確認螢幕無反光。";
        setTimeout(() => { statusText.style.display = "none"; }, 4000);
    }
    input.value = ""; 
}

function add() {
    let searchInput = document.getElementById("search");
    let noteInput = document.getElementById("note");
    let photoInput = document.getElementById("photo");
    let address = searchInput.value;
    let note = noteInput.value;
    let p = photoInput.files[0];

    if (!address) { alert("⚠️ 請至少輸入地址喔！"); return; }

    if (p) {
        let reader = new FileReader();
        reader.onload = function(e) {
            let img = new Image();
            img.onload = function() {
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                let maxWidth = 350;
                let scale = maxWidth / img.width;
                if (scale > 1) scale = 1; 
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                let compressedBase64 = canvas.toDataURL('image/jpeg', 0.4);
                saveNewRecord(address, note, compressedBase64);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(p);
    } else {
        saveNewRecord(address, note, ""); 
    }
}

function saveNewRecord(address, note, photoBase64) {
    let existingIndex = data.findIndex(d => d.address === address);
    if (existingIndex !== -1) {
        data[existingIndex].note = note;
        if (photoBase64) data[existingIndex].photo = photoBase64;
    } else {
        data.push({ address: address, mine: true, note: note, photo: photoBase64 });
    }
    saveDataToPhone(); 
    document.getElementById("search").value = "";
    document.getElementById("note").value = "";
    document.getElementById("photo").value = "";
    document.getElementById("suggest").innerHTML = "";
    render();
    alert("✅ 儲存成功！");
}

function toggleMine(i) {
    data[i].mine = !data[i].mine;
    saveDataToPhone(); 
    render();
}

function remove(i) {
    if (confirm("🗑️ 確定要刪除這筆紀錄嗎？")) {
        data.splice(i, 1);
        saveDataToPhone(); 
        render();
    }
}

function nav(address) {
    let url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(address);
    window.open(url, "_blank");
}

function resetApp() {
    if (confirm("⚠️ 警告：這會清空所有照片與地址。確定要重置嗎？")) {
        localStorage.removeItem('deliveryMines');
        alert("資料已清空！即將重新載入。");
        location.reload();
    }
}

function render() {
    let html = "";
    let reversedData = [...data].reverse(); 
    reversedData.forEach((d, index) => {
        let originalIndex = data.length - 1 - index; 
        html += `
        <div class="card" style="border-left: ${d.mine ? '6px solid #ff4444' : '6px solid #2ecc71'};">
            <h3 style="margin-top:0;">${d.mine ? "💀 雷區：" : "✅ 友善區："}${d.address}</h3>
            ${d.note ? `<div class="note">📝 ${d.note}</div>` : ""}
            ${d.photo ? `<img src="${d.photo}">` : ""}
            <div style="margin-top:15px;">
                <button class="nav" onclick="nav('${d.address}')">🗺️ 導航</button>
                <button class="${d.mine ? 'safe' : 'mine'}" onclick="toggleMine(${originalIndex})">
                    ${d.mine ? "轉為友善" : "設為雷區"}
                </button>
                <button class="delete" onclick="remove(${originalIndex})">刪除</button>
            </div>
        </div>`;
    });
    document.getElementById("list").innerHTML = html;
}
</script>

</body>
</html>
