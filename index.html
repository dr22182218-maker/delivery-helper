<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掃雷助手 🛵</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
background:#111;
color:white;
font-family:"微軟正黑體", Arial, sans-serif;
text-align:center;
padding:15px;
}

input,textarea{
width:90%;
padding:12px;
margin:8px 0;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.scan{background:#3498db;color:white;}
.nav{background:#2ecc71;color:white;}
.add{background:#e74c3c;color:white;width:90%;}
.mine{background:#ff4444;color:white;}
.safe{background:#f39c12;color:white;}
.delete{background:#555;color:white;}
.gps{background:#9b59b6;color:white; font-size: 15px;}

.card{
background:#222;
padding:15px;
margin:15px 5%;
border-radius:10px;
text-align:left;
}

.suggest{
background:#333;
margin:5px;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.note{
background:#333;
padding:8px;
border-radius:5px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>掃雷助手 🛵</h1>

<input id="search" placeholder="輸入地址或關鍵字" oninput="suggest()">

<br>

<button class="scan" onclick="document.getElementById('ocr').click()">📷 拍訂單</button>
<button class="nav" onclick="directNav()">🗺️ 直接導航</button>
<button class="gps" onclick="saveParking()">📍 記錄停車點</button>

<input type="file" id="ocr" accept="image/*" capture="environment" style="display:none" onchange="scan(this)">

<div id="suggest"></div>

<textarea id="note" placeholder="備註 (停車 / 入口 / 換證)"></textarea>

<button class="add" onclick="add()">新增雷區</button>

<hr>

<div id="list"></div>

<script>

const defaultMines=[
{address:"南港區研究院路二段128號 中央研究院",mine:true,note:"院區很大"},
{address:"南港區忠孝東路七段359號 南港車站",mine:true,note:"共構商場"},
{address:"汐止區新台五路一段97號 IFG遠雄廣場",mine:true,note:"百貨難停車"}
];

let data=JSON.parse(localStorage.getItem("deliveryMines"));

if(!data){
    data=defaultMines;
    save();
}

render();

function save(){
    localStorage.setItem("deliveryMines",JSON.stringify(data));
}

function clean(str){
    return str.replace(/\s+/g,"").toLowerCase();
}

// 🌟 修復 1：拿掉長度限制，打一個字也能搜
function suggest(){
    let s=clean(document.getElementById("search").value);

    if(s === ""){
        document.getElementById("suggest").innerHTML="";
        return;
    }

    let html="";

    data.forEach(d=>{
        let addr=clean(d.address);
        if(addr.includes(s)){
            html+=`<div class="suggest" onclick="selectAddress('${d.address}')">
            ${d.mine?"💀":"✅"} ${d.address}
            </div>`;
        }
    });

    document.getElementById("suggest").innerHTML=html;
}

function selectAddress(a){
    document.getElementById("search").value=a;
    document.getElementById("suggest").innerHTML="";
}

// 🌟 修復 2：換成最穩定、支援全平台的 Google Maps 官方連結
function nav(address){
    let url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(address);
    window.open(url, "_blank");
}

function directNav(){
    let address=document.getElementById("search").value;

    if(!address){
        alert("請輸入地址");
        return;
    }

    let found=data.find(d=>clean(address).includes(clean(d.address)));

    if(found && found.mine){
        if(!confirm("⚠️ 雷區\n\n"+found.address+"\n\n仍要導航?")){
            return;
        }
    }

    nav(address);
}

async function scan(input){
    if(!input.files[0])return;
    
    document.getElementById("search").value = "辨識中...";
    const {data:{text}}=await Tesseract.recognize(input.files[0],"chi_tra");
    let addr=text.match(/[\u4e00-\u9fa5]{2,}(區|市).+?(路|街).+?\d+號/);

    if(addr){
        document.getElementById("search").value=addr[0];
    }else{
        document.getElementById("search").value=text;
    }
    suggest();
}

function add(){
    let address=document.getElementById("search").value;
    let note=document.getElementById("note").value;

    if(!address){
        alert("請輸入地址");
        return;
    }

    data.push({address:address,mine:true,note:note});
    save();
    render();

    document.getElementById("search").value="";
    document.getElementById("note").value="";
}

function remove(i){
    data.splice(i,1);
    save();
    render();
}

function toggleMine(i){
    data[i].mine=!data[i].mine;
    save();
    render();
}

// 🌟 修復 3：加入高精度模式與錯誤警告
function saveParking(){
    if (!navigator.geolocation) {
        alert("❌ 你的手機瀏覽器不支援定位功能！");
        return;
    }

    navigator.geolocation.getCurrentPosition(pos=>{
        let lat=pos.coords.latitude;
        let lon=pos.coords.longitude;
        localStorage.setItem("parkingSpot", lat+","+lon);
        alert("📍 已精準記錄愛車位置！放心地去送餐吧！");
    }, err => {
        alert("❌ 定位失敗！請檢查手機是否開啟 GPS 與網頁定位權限！");
    }, {
        enableHighAccuracy: true // 強制使用精準 GPS
    });
}

function goParking(){
    let p=localStorage.getItem("parkingSpot");
    if(!p){
        alert("⚠️ 你還沒有記錄停車位置喔！");
        return;
    }
    // 使用座標專用的 Google Maps 網址
    let url = "https://www.google.com/maps/search/?api=1&query=" + p;
    window.open(url, "_blank");
}

function render(){
    let html="";

    data.slice().reverse().forEach((d,i)=>{
        let idx=data.length-1-i;

        html+=`
        <div class="card">
        <h3 style="margin-top:0;">${d.mine?"💀":"✅"} ${d.address}</h3>
        ${d.note?`<div class="note">📝 ${d.note}</div>`:""}
        
        <br>
        <button class="nav" onclick="nav('${d.address}')">導航</button>
        <button class="${d.mine?'safe':'mine'}" onclick="toggleMine(${idx})">
        ${d.mine?"轉友善":"設雷區"}
        </button>
        <button class="delete" onclick="remove(${idx})">刪除</button>
        </div>
        `;
    });

    // 停車區塊獨立出來，看起來更霸氣
    html+=`
    <div class="card" style="border-left: 6px solid #9b59b6;">
    <h3 style="margin-top:0;">🏍 愛車雷達</h3>
    <button class="gps" onclick="goParking()" style="width:100%;">📍 導航回機車</button>
    </div>
    `;

    document.getElementById("list").innerHTML=html;
}

</script>

</body>
</html>
