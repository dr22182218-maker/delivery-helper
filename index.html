<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>掃雷助手 🛵</title>

<style>
body{ background:#111; color:white; font-family:"微軟正黑體", Arial; text-align:center; padding:15px; }
input,textarea{ width:90%; padding:12px; margin:8px 0; font-size:16px; border-radius:8px; border:none; }
button{ padding:12px; margin:5px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;}

.nav{background:#2ecc71;color:white;}
.add{background:#e74c3c;color:white;width:90%;}
.mine{background:#ff4444;color:white;}
.safe{background:#f39c12;color:white;}
.delete{background:#555;color:white;}

.card{ background:#222; padding:15px; margin:15px 5%; border-radius:10px; text-align:left; }
.suggest{ background:#333; margin:5px; padding:12px; border-radius:6px; cursor:pointer; text-align:left;}
.note{ background:#333; padding:8px; border-radius:5px; margin-top:10px; }
</style>

</head>

<body>

<h1>掃雷助手 🛵</h1>

<input id="search" placeholder="輸入地址 / 社區 / 關鍵字" oninput="suggest()">

<div id="suggest"></div>

<br>

<button class="nav" onclick="directNav()">🗺️ 直接導航</button>

<textarea id="note" placeholder="備註 (停車 / 入口 / 社區名)"></textarea>

<button class="add" onclick="add()">新增雷區</button>

<hr>

<div id="list"></div>

<script>

// 這是你專屬的雷區資料
const defaultMines=[
    {address:"研究院路二段12巷58弄19號",mine:false,note:"新苗幼稚園附近"},
    {address:"東勢街201巷106弄38號",mine:true,note:"天宿旁社區"}
];

let data=JSON.parse(localStorage.getItem("deliveryMines"));
if(!data){
    data=defaultMines;
    save();
}

render();

function save(){
    localStorage.setItem("deliveryMines",JSON.stringify(data));
}

function suggest(){
    let keyword=document.getElementById("search").value.trim().toLowerCase();
    let box=document.getElementById("suggest");

    if(!keyword){
        box.innerHTML="";
        return;
    }

    let html="";

    // 1. 先比對資料庫裡的雷區
    data.forEach(d=>{
        let addr=(d.address||"").toLowerCase();
        let note=(d.note||"").toLowerCase();

        if(addr.includes(keyword) || note.includes(keyword)){
            let borderColor = d.mine ? "#ff4444" : "#2ecc71";
            html+=`
            <div class="suggest" style="border-left: 5px solid ${borderColor};" onclick="selectAddress('${d.address}')">
            ${d.mine?"💀":"✅"} ${d.address}
            ${d.note?`<div style="font-size:13px;color:#aaa;margin-top:4px;">📝 ${d.note}</div>`:""}
            </div>
            `;
        }
    });

    // 2. 🌟 關鍵復活：無論有沒有雷區，永遠在最下方提供「直接導航」選項
    html+=`
    <div class="suggest" style="background:#2ecc71; color:white; text-align:center; font-weight:bold; border:none;" onclick="nav('${keyword}')">
    🗺️ 直接導航前往：「${keyword}」
    </div>
    `;

    box.innerHTML=html;
}

function selectAddress(a){
    document.getElementById("search").value=a;
    document.getElementById("suggest").innerHTML="";
    // 自動帶出備註
    let ex = data.find(d => d.address === a);
    if(ex && ex.note) {
        document.getElementById("note").value = ex.note;
    }
}

// 🌟 修復導航網址，改回穩定的 /1
function nav(address){
    window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(address), "_blank");
    // 導航後順便把選單收起來
    document.getElementById("suggest").innerHTML="";
}

function directNav(){
    let address=document.getElementById("search").value;
    if(!address){
        alert("請輸入地址");
        return;
    }
    nav(address);
}

function add(){
    let address=document.getElementById("search").value;
    let note=document.getElementById("note").value;

    if(!address){
        alert("請輸入地址");
        return;
    }

    let idx=data.findIndex(d=>d.address===address);
    if(idx!==-1){
        data[idx].note=note;
    }else{
        data.push({
            address:address,
            mine:true,
            note:note
        });
    }

    save();
    render();

    document.getElementById("search").value="";
    document.getElementById("note").value="";
    document.getElementById("suggest").innerHTML="";
}

function remove(i){
    if(confirm("確定刪除嗎？")){
        data.splice(i,1);
        save();
        render();
    }
}

function toggleMine(i){
    data[i].mine=!data[i].mine;
    save();
    render();
}

function render(){
    let html="";

    data.slice().reverse().forEach((d,i)=>{
        let idx=data.length-1-i;
        let borderColor = d.mine ? "#ff4444" : "#2ecc71";

        html+=`
        <div class="card" style="border-left: 6px solid ${borderColor};">
        <h3 style="margin-top:0;">${d.mine?"💀":"✅"} ${d.address}</h3>
        ${d.note?`<div class="note">📝 ${d.note}</div>`:""}
        
        <br>
        <button class="nav" onclick="nav('${d.address}')">導航</button>
        <button class="${d.mine?'safe':'mine'}" onclick="toggleMine(${idx})">
        ${d.mine?"轉友善":"設雷區"}
        </button>
        <button class="delete" onclick="remove(${idx})">刪除</button>
        </div>
        `;
    });

    document.getElementById("list").innerHTML=html;
}

</script>

</body>
</html>
