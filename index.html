<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>掃雷助手 🛵</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:"微軟正黑體",Arial;
margin:0;
padding:20px;
text-align:center;
}

h1{
font-size:32px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:16px;
margin:10px 0;
font-size:18px;
border-radius:10px;
border:none;
box-sizing:border-box;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn-blue{
background:#3498db;
color:white;
}

.btn-green{
background:#2ecc71;
color:white;
}

.btn-red{
background:#e74c3c;
color:white;
width:100%;
margin-top:10px;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
margin:10px 0;
}

.suggest-box{
text-align:left;
margin-top:5px;
}

.suggest-item{
background:#2a2a2a;
padding:12px;
margin:5px 0;
border-radius:6px;
font-size:16px;
border-left:5px solid #3498db;
cursor:pointer;
}

.direct-nav{
background:#27ae60;
padding:14px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
text-align:center;
}

.card{
background:#1c1c1c;
padding:15px;
margin:15px 0;
border-radius:10px;
text-align:left;
}

.card button{
margin-right:6px;
margin-top:6px;
}
</style>
</head>

<body>

<h1>掃雷助手 🛵</h1>

<input id="search" placeholder="輸入地址或語音" oninput="suggest()">

<div class="actions">
<button class="btn-blue" onclick="voice()">🎤 語音輸入</button>
<button class="btn-green" onclick="nav()">🗺️ 直接導航</button>
</div>

<div id="suggest" class="suggest-box"></div>

<textarea id="note" placeholder="備註（停車 / 入口 / 社區名）"></textarea>

<button class="btn-red" onclick="add()">新增雷區</button>

<hr>

<div id="list"></div>

<script>

const defaultMines=[
{address:"南港區忠孝東路七段359號 南港火車站",mine:true,note:"共構商場"},
{address:"南港區研究院路二段128號 中央研究院",mine:true,note:"院區很大"}
];

const streetDB=[
{
key:"合順街",
list:[
"南港區合順街1號",
"南港區合順街5巷",
"南港區合順街7巷",
"南港區合順街12弄",
"南港區合順街20號"
]
},
{
key:"研究院路",
list:[
"南港區研究院路一段",
"南港區研究院路二段",
"南港區研究院路三段"
]
}
];

let data=JSON.parse(localStorage.getItem("deliveryMines"));

if(!data||data.length==0){
data=defaultMines;
save();
}

function save(){
localStorage.setItem("deliveryMines",JSON.stringify(data));
}

function clean(str){
return str.replace(/\s+/g,"").toLowerCase();
}

function generateNumbers(street){

let arr=[];

for(let i=1;i<=30;i++){
arr.push("南港區"+street+i+"號");
}

return arr;

}

function suggest(){

let raw=document.getElementById("search").value;
let s=clean(raw);
let box=document.getElementById("suggest");

if(!raw){
box.innerHTML="";
return;
}

let html="";

data.forEach(d=>{

if(clean(d.address).includes(s)){

let color=d.mine?"#ff4444":"#2ecc71";
let icon=d.mine?"💀":"✅";

html+=`
<div class="suggest-item"
style="border-left-color:${color};color:${color}"
onclick="selectAddress('${d.address}')">
${icon} ${d.address}
</div>
`;

}

});

streetDB.forEach(sdb=>{

let key=clean(sdb.key);

if(s.includes(key) || key.includes(s)){

sdb.list.forEach(addr=>{

html+=`
<div class="suggest-item"
style="border-left-color:#3498db;color:#3498db"
onclick="navTo('${addr}')">
📍 ${addr}
</div>
`;

});

}

});

if(raw.length>=2){

generateNumbers(raw).slice(0,6).forEach(addr=>{

html+=`
<div class="suggest-item"
style="border-left-color:#888;color:#ccc"
onclick="navTo('${addr}')">
🏠 ${addr}
</div>
`;

});

}

html+=`
<div class="direct-nav"
onclick="navTo('${raw}')">
🗺️ 直接導航 ${raw}
</div>
`;

box.innerHTML=html;

}

function selectAddress(a){

document.getElementById("search").value=a;
document.getElementById("suggest").innerHTML="";

let ex=data.find(d=>d.address==a);

if(ex && ex.note){
document.getElementById("note").value=ex.note;
}

}

function nav(){

let addr=document.getElementById("search").value;

if(!addr){
alert("請輸入地址");
return;
}

navTo(addr);

}

function navTo(addr){

let url="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(addr);

window.open(url,"_blank");

}

function add(){

let addr=document.getElementById("search").value;
let note=document.getElementById("note").value;

if(!addr){
alert("請輸入地址");
return;
}

let idx=data.findIndex(d=>clean(d.address)==clean(addr));

if(idx!=-1){
data[idx].note=note;
}else{
data.push({address:addr,mine:true,note:note});
}

save();
render();

document.getElementById("search").value="";
document.getElementById("note").value="";
document.getElementById("suggest").innerHTML="";

}

function render(){

let html="";

data.slice().reverse().forEach((d,i)=>{

let idx=data.length-1-i;
let color=d.mine?"#ff4444":"#2ecc71";

html+=`

<div class="card" style="border-left:6px solid ${color}">

<h3>${d.mine?"💀":"✅"} ${d.address}</h3>

<div style="color:#ccc;margin:8px 0">${d.note||""}</div>

<button class="btn-green" onclick="navTo('${d.address}')">導航</button>

<button class="btn-red" onclick="toggle(${idx})">
${d.mine?"轉友善":"設雷區"}
</button>

<button onclick="del(${idx})">
刪除
</button>

</div>

`;

});

document.getElementById("list").innerHTML=html;

}

function toggle(i){

data[i].mine=!data[i].mine;

save();
render();

}

function del(i){

if(confirm("確定刪除？")){
data.splice(i,1);
save();
render();
}

}

function voice(){

const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();

rec.lang="zh-TW";

rec.start();

rec.onresult=function(e){

let text=e.results[0][0].transcript;

document.getElementById("search").value=text;

suggest();

};

}

render();

</script>

</body>
</html>
