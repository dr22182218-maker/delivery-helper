<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>掃雷助手 🛵</title>

<style>
body {
    background: #111;
    color: white;
    font-family: "微軟正黑體", Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
}

input, textarea {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    font-size: 16px;
    box-sizing: border-box;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
}

.add { background: #e74c3c; color: white; width: 90%; font-size: 18px; margin-top: 10px; }
.mine { background: #ff4444; color: white; }
.safe { background: #f39c12; color: white; }
.nav { background: #2ecc71; color: white; }
.delete { background: #555; color: white; }
.reset { background: #8e44ad; color: white; width: 90%; margin-top: 30px; font-size: 14px;}

.card {
    background: #222;
    padding: 15px;
    margin: 15px 5%;
    border-radius: 10px;
    text-align: left;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.suggest {
    background: #333;
    margin: 5px 5%;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
}

.note {
    color: #ccc;
    font-size: 15px;
    margin-top: 10px;
    background: #333;
    padding: 8px;
    border-radius: 5px;
}

img {
    width: 100%;
    margin-top: 12px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h1>掃雷助手 🛵</h1>

<input id="search" placeholder="輸入地址或路名 (如: 瑞光路)" onkeyup="suggest()">
<div id="suggest"></div>

<textarea id="note" placeholder="備註 (停車位置 / 入口 / 換證 / 沒電梯)" rows="3"></textarea>

<input type="file" id="photo" accept="image/*">

<button class="add" onclick="add()">新增雷區</button>

<hr style="border: 0.5px solid #333; margin: 20px 0;">

<div id="list"></div>

<button class="reset" onclick="resetApp()">⚠️ 清除所有資料 (重置 APP)</button>

<script>
const defaultMines = [
    { address: "汐止區湖前街110巷97弄24號 水蓮山莊", mine: true, note: "佔地太大，動線複雜", photo: "" },
    { address: "汐止區新台五路一段88號 宏碁大樓", mine: true, note: "", photo: "" },
    { address: "汐止區新台五路一段79號 遠東世界中心", mine: true, note: "", photo: "" },
    { address: "汐止區新台五路一段96號 東方科學園區", mine: true, note: "", photo: "" },
    { address: "汐止區新台五路一段97號 IFG遠雄廣場", mine: true, note: "百貨公司難停車、取送餐皆耗時", photo: "" },
    { address: "內湖區瑞光路全線", mine: true, note: "⚠️ 4點半後車塞到屁股發光！慎接！", photo: "" },
    { address: "內湖區成功路二段325號 三軍總醫院", mine: true, note: "醫院大魔王，佔地廣大", photo: "" },
    { address: "內湖區民權東路六段161號 國防醫學院", mine: true, note: "門禁森嚴", photo: "" },
    { address: "內湖區成功路五段420巷26號 康寧醫院", mine: true, note: "", photo: "" },
    { address: "內湖區民善街205號 內湖花市", mine: true, note: "腹地大，找路麻煩", photo: "" },
    { address: "內湖區新湖三路28號 內湖花市B館/盆花A館", mine: true, note: "", photo: "" },
    { address: "南港區經貿二路1號 南港展覽館", mine: true, note: "展期人多難停，送餐需聯絡清楚", photo: "" },
    { address: "南港區園區街3號 南港軟體園區", mine: true, note: "大樓多，找棟別花時間", photo: "" },
    { address: "南港區三重路 南港軟體園區", mine: true, note: "", photo: "" },
    { address: "南港區研究院路二段128號 中央研究院", mine: true, note: "院區超大，猶如迷宮", photo: "" },
    { address: "南港區忠孝東路七段359號 南港火車站", mine: true, note: "共構商場，無法臨停", photo: "" }
];

let data = JSON.parse(localStorage.getItem('deliveryMines'));
if (!data || data.length === 0) {
    data = defaultMines;
    saveDataToPhone();
}

let knownAddresses = data.map(d => d.address);
render();

function suggest() {
    let s = document.getElementById("search").value;
    let html = "";
    if (s !== "") {
        let count = 0;
        knownAddresses.forEach(a => {
            if (a.includes(s) && count < 5) {
                html += `<div class="suggest" onclick="selectAddress('${a}')">📍 ${a}</div>`;
                count++;
            }
        });
    }
    document.getElementById("suggest").innerHTML = html;
}

function selectAddress(a) {
    document.getElementById("search").value = a;
    document.getElementById("suggest").innerHTML = "";
    let existingRecord = data.find(d => d.address === a);
    if(existingRecord) document.getElementById("note").value = existingRecord.note;
}

function saveDataToPhone() {
    try {
        localStorage.setItem('deliveryMines', JSON.stringify(data));
        knownAddresses = data.map(d => d.address);
    } catch (e) {
        alert("儲存失敗！可能是照片容量太大導致手機儲存空間不足。請嘗試刪除幾筆舊照片。");
    }
}

function add() {
    let searchInput = document.getElementById("search");
    let noteInput = document.getElementById("note");
    let photoInput = document.getElementById("photo");
    
    let address = searchInput.value;
    let note = noteInput.value;
    let p = photoInput.files[0];

    if (!address) {
        alert("⚠️ 請至少輸入地址喔！");
        return;
    }

    if (p) {
        let reader = new FileReader();
        reader.onload = function(e) {
            let img = new Image();
            img.onload = function() {
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                
                // 🌟 終極壓縮：寬度降到 350px (夠看清楚大樓了)，容量極小！
                let maxWidth = 350;
                let scale = maxWidth / img.width;
                if (scale > 1) scale = 1; 
                
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // 🌟 畫質降至 0.4，一張圖大約只剩 20KB~30KB
                let compressedBase64 = canvas.toDataURL('image/jpeg', 0.4);
                saveNewRecord(address, note, compressedBase64);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(p);
    } else {
        saveNewRecord(address, note, ""); 
    }
}

function saveNewRecord(address, note, photoBase64) {
    let existingIndex = data.findIndex(d => d.address === address);
    if (existingIndex !== -1) {
        data[existingIndex].note = note;
        if (photoBase64) data[existingIndex].photo = photoBase64;
    } else {
        data.push({ address: address, mine: true, note: note, photo: photoBase64 });
    }

    saveDataToPhone(); 
    document.getElementById("search").value = "";
    document.getElementById("note").value = "";
    document.getElementById("photo").value = "";
    document.getElementById("suggest").innerHTML = "";
    render();
    alert("✅ 儲存成功！");
}

function toggleMine(i) {
    data[i].mine = !data[i].mine;
    saveDataToPhone(); 
    render();
}

function remove(i) {
    if (confirm("🗑️ 確定要刪除這筆紀錄嗎？")) {
        data.splice(i, 1);
        saveDataToPhone(); 
        render();
    }
}

function nav(address) {
    let url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(address);
    window.open(url, "_blank");
}

// 🌟 清空記憶體，把之前塞爆的巨大照片全砍掉！
function resetApp() {
    if (confirm("⚠️ 警告：這會清空你手機裡所有存過的照片與地址，並回復到預設的 16 筆雙北雷區清單。確定要重置嗎？")) {
        localStorage.removeItem('deliveryMines');
        alert("資料已清空！即將重新載入。");
        location.reload();
    }
}

function render() {
    let html = "";
    let reversedData = [...data].reverse(); 
    reversedData.forEach((d, index) => {
        let originalIndex = data.length - 1 - index; 
        html += `
        <div class="card" style="border-left: ${d.mine ? '6px solid #ff4444' : '6px solid #2ecc71'};">
            <h3 style="margin-top:0;">${d.mine ? "💀 雷區：" : "✅ 友善區："}${d.address}</h3>
            ${d.note ? `<div class="note">📝 ${d.note}</div>` : ""}
            ${d.photo ? `<img src="${d.photo}">` : ""}
            <div style="margin-top:15px;">
                <button class="nav" onclick="nav('${d.address}')">🗺️ 導航</button>
                <button class="${d.mine ? 'safe' : 'mine'}" onclick="toggleMine(${originalIndex})">
                    ${d.mine ? "轉為友善" : "設為雷區"}
                </button>
                <button class="delete" onclick="remove(${originalIndex})">刪除</button>
            </div>
        </div>`;
    });
    document.getElementById("list").innerHTML = html;
}
</script>

</body>
</html>
